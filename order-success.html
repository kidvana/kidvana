<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Kidvana</title>
    <meta name="description" content="Your Kidvana order has been placed successfully.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/support-pages.css">
    <style>
        .success-box {
            max-width: 900px;
            margin: 40px auto;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }
        .success-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 28px;
            margin-top: 28px;
        }
        .order-item {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 14px 0;
            border-top: 1px solid var(--gray-100);
        }
        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            background: var(--gray-50);
        }
        @media (max-width: 991px) {
            .success-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container" style="display:flex; justify-content:center; padding:20px 0;">
            <a href="index.html" class="header-logo">
                <img src="assets/logo/kidvana-logo.svg" alt="Kidvana Logo" style="height:48px; width:auto; margin-right:12px;">
                <div class="logo-text">Kidvana</div>
            </a>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="success-box">
                <div style="text-align:center;">
                    <div style="font-size:4rem; margin-bottom:16px;">Order Confirmed</div>
                    <h1 style="font-size:2.2rem; margin-bottom:8px;">Thank you for shopping with Kidvana</h1>
                    <p style="color:var(--gray-500);">Your order has been received and is now being prepared for dispatch.</p>
                    <div class="order-id-badge" id="orderIdDisplay" style="display:inline-block;background:var(--primary-light-alpha);color:var(--primary);padding:8px 20px;border-radius:30px;font-weight:800;margin:16px 0;">ORDER</div>
                </div>

                <div class="success-grid">
                    <div>
                        <div class="support-card" style="margin-bottom:20px;">
                            <h2>Ordered Items</h2>
                            <div id="orderedItems"></div>
                        </div>
                    </div>
                    <div>
                        <div class="support-card" style="margin-bottom:20px;">
                            <h2>Order Summary</h2>
                            <div id="orderSummaryDetails"></div>
                        </div>
                        <div class="support-card" style="margin-bottom:0;">
                            <h2>Next Steps</h2>
                            <div style="display:flex; flex-direction:column; gap:12px;">
                                <a id="trackOrderLink" href="track-order.html" class="btn btn-primary btn-lg">Track Order</a>
                                <a href="dashboard.html" class="btn btn-outline">Go to Dashboard</a>
                                <a href="index.html" class="btn btn-outline">Continue Shopping</a>
                                <button class="btn btn-outline" onclick="window.print()">Print Invoice</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/orders.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');
            const order = getOrderById(orderId);
            const user = typeof getAuthUser === 'function' ? getAuthUser() : null;

            if (!order) {
                document.getElementById('orderIdDisplay').textContent = 'ORDER NOT FOUND';
                document.getElementById('orderedItems').innerHTML = '<p style="color:var(--gray-500);">We could not find this order in the current session.</p>';
                document.getElementById('orderSummaryDetails').innerHTML = '<p style="color:var(--gray-500);">Please use Track Order with your order ID and phone number.</p>';
                return;
            }

            document.getElementById('orderIdDisplay').textContent = `ORDER #${order.id}`;
            document.getElementById('trackOrderLink').href = `track-order.html?id=${encodeURIComponent(order.id)}`;

            document.getElementById('orderedItems').innerHTML = order.items.map(item => `
                <div class="order-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div style="flex:1;">
                        <div style="font-weight:700;">${item.name}</div>
                        <div style="color:var(--gray-500); font-size:0.9rem;">Qty: ${item.quantity} x Rs.${Number(item.price).toLocaleString()}</div>
                    </div>
                    <div style="font-weight:700;">Rs.${(Number(item.price) * Number(item.quantity)).toLocaleString()}</div>
                </div>
            `).join('');

            const orderDate = new Date(order.date);
            const minDelivery = new Date(orderDate);
            const maxDelivery = new Date(orderDate);
            minDelivery.setDate(orderDate.getDate() + 4);
            maxDelivery.setDate(orderDate.getDate() + 7);

            document.getElementById('orderSummaryDetails').innerHTML = `
                <p><strong>Estimated delivery</strong><br>${minDelivery.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })} - ${maxDelivery.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</p>
                <p style="margin-top:16px;"><strong>Total paid</strong><br>Rs.${Number(order.totals?.total || order.amount || 0).toLocaleString()}</p>
                <p style="margin-top:16px;"><strong>Payment</strong><br>${order.payment?.method || 'N/A'} / ${order.payment?.status || 'Pending'}</p>
                <p style="margin-top:16px;"><strong>Delivery city</strong><br>${order.shipping?.city || '-'}</p>
                <p style="margin-top:16px;"><strong>Phone used</strong><br>${order.shipping?.phone || user?.phone || '-'}</p>
            `;
        });
    </script>
</body>
</html>
