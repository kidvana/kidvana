<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed 🎉 — Kidvana</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .success-box {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 40px auto;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .confetti-icon {
            font-size: 5rem;
            margin-bottom: 24px;
            display: block;
        }

        .order-id-badge {
            display: inline-block;
            background: var(--primary-light-alpha);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 800;
            margin: 16px 0;
            letter-spacing: 1px;
        }

        .summary-card {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 24px;
            margin: 32px 0;
            text-align: left;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container" style="display:flex; justify-content:center; padding: 20px 0;">
            <a href="index.html" class="logo">
                    <img src="IMG DATA/logo/kidvana logo.svg" alt="Kidvana Logo" class="logo-img" style="height: 48px; width: auto; margin-right: 12px;">
                    <div class="logo-text">Kidvana</div>
            </a>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="success-box">
                <span class="confetti-icon">🎉</span>
                <h1 style="font-size: 2.2rem; margin-bottom: 8px;">Order Confirmed!</h1>
                <p style="color:var(--gray-500);">Thank you for shopping with Kidvana.</p>

                <div class="order-id-badge" id="orderIdDisplay">ORDER #GZL-XXXXX</div>

                <div class="summary-card">
                    <h3
                        style="margin-bottom:16px; font-size:1.1rem; border-bottom:1px solid var(--gray-200); padding-bottom:12px;">
                        Estimated Delivery</h3>
                    <div style="display:flex; gap:16px; align-items:center;">
                        <div style="font-size:2rem;">🚚</div>
                        <div>
                            <div style="font-weight:700;" id="deliveryDate">March 1 - March 4</div>
                            <div style="font-size:0.85rem; color:var(--gray-500);">Your package is being prepared for
                                shipping</div>
                        </div>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:12px;">
                    <a href="index.html" class="btn btn-primary btn-lg">Continue Shopping</a>
                    <button class="btn btn-outline" onclick="window.print()">🖨️ Print Invoice</button>
                </div>

                <p style="margin-top:32px; font-size:0.85rem; color:var(--gray-400);">A confirmation email has been sent
                    to your registered address.</p>
            </div>
        </div>
    </main>

    <script src="js/orders.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');
            const order = getOrderById(orderId);

            if (order) {
                document.getElementById('orderIdDisplay').textContent = `ORDER #${order.id}`;

                // Calculate delivery date (+4-7 days)
                const date = new Date(order.date);
                const min = new Date(date); min.setDate(date.getDate() + 4);
                const max = new Date(date); max.setDate(date.getDate() + 7);

                const fmt = { day: 'numeric', month: 'short' };
                document.getElementById('deliveryDate').textContent = `${min.toLocaleDateString('en-IN', fmt)} — ${max.toLocaleDateString('en-IN', fmt)}`;
            }
        });
    </script>
</body>

</html>
