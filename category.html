<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category — Kidvana</title>
    <meta name="description"
        content="Browse products by category at Kidvana. Best deals on electronics, fashion, and more.">

    <link rel="icon" href="assets/logo/kidvana-logo.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .category-header {
            padding: 40px 0;
            background: var(--gray-50);
            margin-bottom: 40px;
            border-bottom: 1px solid var(--gray-200);
        }

        .category-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .category-count {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
    </style>
</head>

<body>
    <!-- ═══ TOP BAR ═══ -->
    <div class="top-bar">
        <div class="top-bar-inner container">
            <span class="top-bar-text"><span class="top-bar-icon">💰</span> Best Prices Guaranteed</span>
            <span class="top-bar-text"><span class="top-bar-icon">🚚</span> Free Delivery on ₹499+</span>
            <span class="top-bar-text"><span class="top-bar-icon">🔒</span> 100% Secure Payments</span>
        </div>
    </div>

    <!-- ═══ HEADER ═══ -->
    <header class="header" id="mainHeader">
        <div class="header-main">
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="header-logo">
                <img src="assets/logo/kidvana-logo.svg" alt="Kidvana Logo" class="logo-img" style="height: 40px; width: auto; margin-right: 12px;">
                <div>
                    <div class="logo-text">Kidvana</div>
                    <span class="logo-sub">Shop Smart, Live Bold</span>
                </div>
            </a>
            <div class="header-search">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search for products..." autocomplete="off">
                <button class="search-btn">→</button>
                <div class="search-suggestions"></div>
            </div>
            <div class="header-actions">
                <a href="wishlist.html" class="header-action-btn"><span class="action-icon">❤️</span></a>
                <a href="cart.html" class="header-action-btn">
                    <span class="action-icon">🛒</span>
                    <span class="cart-count" style="display:none">0</span>
                </a>
                <button class="header-login-btn" onclick="openLoginModal()"><span>Login</span></button>
            </div>
        </div>
        <nav class="category-nav">
            <ul class="category-nav-list">
                <!-- Rendered by JS -->
            </ul>
        </nav>
    </header>

    <!-- Mobile Search -->
    <div class="mobile-search">
        <div style="position:relative">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:0.9rem">🔍</span>
            <input type="text" class="search-input" placeholder="Search products..."
                style="width:100%;padding:10px 16px 10px 40px;border:2px solid var(--gray-200);border-radius:999px;font-size:0.85rem;background:var(--gray-50)">
        </div>
    </div>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="mobile-sidebar-header">
            <h3>Menu</h3>
            <button class="mobile-sidebar-close">✕</button>
        </div>
        <nav class="mobile-sidebar-nav">
            <!-- Rendered by JS -->
        </nav>
    </div>

    <main>
        <section class="category-header">
            <div class="container text-center">
                <h1 class="category-title" id="categoryTitle">All Products</h1>
                <p class="category-count" id="categoryCount">0 items found</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="product-grid" id="categoryGrid">
                    <!-- Products rendered by JS -->
                    <div style="text-align:center;padding:60px;grid-column:1/-1">
                        <p style="color:var(--gray-400)">Loading products...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer class="footer">
        <div class="container text-center" style="padding-top:40px; border-top:1px solid var(--gray-800);">
            <p style="color:var(--gray-500); font-size:0.85rem;">© 2026 Kidvana. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/wishlist.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initial render is handled by fetchProducts in products.js
            // which calls renderCategoryPage
        });
    </script>
</body>

</html>
