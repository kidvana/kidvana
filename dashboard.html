<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Kidvana</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--primary, #007bff);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .save-btn {
            background: var(--primary, #007bff);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .logout-btn {
            background: #f8f9fa;
            color: #dc3545;
            border: 1px solid #dc3545;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <!-- ═══ TOP BAR ═══ -->
    <div class="top-bar">
        <div class="top-bar-inner container">
            <span class="top-bar-text"><span class="top-bar-icon">💰</span> Best Prices Guaranteed</span>
            <span class="top-bar-text"><span class="top-bar-icon">🚚</span> Free Delivery on ₹499+</span>
            <span class="top-bar-text"><span class="top-bar-icon">🔒</span> 100% Secure Payments</span>
            <span class="top-bar-text"><span class="top-bar-icon">↩️</span> Easy Returns</span>
        </div>
    </div>

    <header class="header" id="mainHeader">
        <div class="header-main">
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="header-logo">
                <div class="logo-icon">S</div>
                <div>
                    <div class="logo-text">GenZeLoot</div>
                    <span class="logo-sub">Shop Smart, Live Bold</span>
                </div>
            </a>
            <div class="header-search">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search for products, brands and more..."
                    autocomplete="off">
                <button class="search-btn" aria-label="Search">→</button>
                <div class="search-suggestions"></div>
            </div>
            <div class="header-actions">
                <button class="header-action-btn" onclick="openLoginModal()">
                    <span class="action-icon">👤</span>
                    <span class="action-label">Account</span>
                </button>
                <a href="wishlist.html" class="header-action-btn">
                    <span class="action-icon">❤️</span>
                    <span class="action-label">Wishlist</span>
                </a>
                <a href="cart.html" class="header-action-btn">
                    <span class="action-icon">🛒</span>
                    <span class="cart-count" style="display:none">0</span>
                    <span class="action-label">Cart</span>
                </a>
            </div>
        </div>
        <nav class="category-nav">
            <ul class="category-nav-list">
                <!-- Rendered by JS -->
            </ul>
        </nav>
    </header>

    <!-- Mobile Sidebar -->
    <div class="mobile-sidebar-overlay" id="sidebarOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="mobile-sidebar-header">
            <h3>Menu</h3>
            <button class="mobile-sidebar-close">✕</button>
        </div>
        <nav class="mobile-sidebar-nav">
            <!-- Rendered by JS -->
        </nav>
    </div>

    <main class="container">
        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar-circle" id="userAvatar">U</div>
                <div>
                    <h2 id="userNameDisplay">Welcome, User!</h2>
                    <p id="userPhoneDisplay" style="color: #666;">+91 0000000000</p>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="setFullName" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="setEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="setPhone" readonly style="background: #f1f1f1;">
                </div>
                <button type="submit" class="save-btn">Save Changes</button>
            </form>

            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"
                style="text-align:center; padding-top:40px; border-top:1px solid var(--gray-800);">
                <p style="color:var(--gray-500); font-size:0.85rem;">© 2026 Kidvana. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
