<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout — Payment & Shipping | Kidvana</title>
    <meta name="description" content="Complete your premium order securely. SSL-encrypted checkout for a safe and fast shopping experience at Kidvana.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="icon" href="assets/logo/kidvana-logo.svg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/product.css">
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .checkout-header {
            padding: 32px 0;
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            text-align: center;
        }
        .checkout-steps {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 40px 0;
            position: relative;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 2;
        }
        .step::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 100%;
            width: 60px;
            height: 2px;
            background: var(--gray-100);
            z-index: -1;
        }
        .step:last-child::after { display: none; }
        .step-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--gray-400);
            transition: all var(--transition-base);
        }
        .step.active .step-num {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 0 0 6px var(--primary-light);
        }
        .step.completed .step-num {
            background: var(--accent-green);
            color: var(--white);
        }
        .step-label { font-size: 0.85rem; font-weight: 700; color: var(--gray-400); }
        .step.active .step-label { color: var(--primary); }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
            margin-bottom: 80px;
        }
        .checkout-card {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--gray-100);
            box-shadow: var(--shadow-sm);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .payment-option {
            padding: 24px;
            border: 2px solid var(--gray-100);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all var(--transition-base);
        }
        .payment-option:hover { border-color: var(--primary-light); }
        .payment-option.active {
            border-color: var(--primary);
            background: var(--bg-section-alt);
        }
        @media (max-width: 991px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="checkout-header">
        <div class="container">
            <a href="index.html" class="header-logo inline-flex">
                <img src="assets/logo/kidvana-logo.svg" alt="Kidvana Logo" style="height:48px">
                <div class="text-left ml-3">
                    <span class="logo-text">Kidvana</span>
                    <span class="logo-sub">SECURE CHECKOUT</span>
                </div>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="checkout-steps reveal">
            <div class="step active" id="step1">
                <div class="step-num">1</div>
                <span class="step-label">Shipping</span>
            </div>
            <div class="step" id="step2">
                <div class="step-num">2</div>
                <span class="step-label">Payment</span>
            </div>
            <div class="step" id="step3">
                <div class="step-num">3</div>
                <span class="step-label">Complete</span>
            </div>
        </div>

        <div class="checkout-grid reveal">
            <div class="checkout-main">
                <!-- Shipping -->
                <div id="sectionShipping" class="checkout-card">
                    <h3 class="mb-6">Shipping Information</h3>
                    <form id="shippingForm" onsubmit="event.preventDefault(); showSection('Payment')">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="John Doe" required class="form-input">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" placeholder="john@example.com" required class="form-input">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" placeholder="+91 999 999 9999" required class="form-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" placeholder="House No, Building, Area" required class="form-input">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" required class="form-input">
                            </div>
                            <div class="form-group">
                                <label>Pincode</label>
                                <input type="text" maxlength="6" required class="form-input">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-full mt-6">Continue to Payment</button>
                    </form>
                </div>

                <!-- Payment -->
                <div id="sectionPayment" class="checkout-card" style="display:none">
                    <h3 class="mb-6">Payment Method</h3>
                    <div class="payment-options">
                        <div class="payment-option active" onclick="selectPayment('razorpay')">
                            <span style="font-size:1.5rem">💳</span>
                            <div>
                                <strong class="block">Online Payment</strong>
                                <small class="text-gray-400">Cards, UPI, NetBanking</small>
                            </div>
                        </div>
                        <div class="payment-option" onclick="selectPayment('cod')">
                            <span style="font-size:1.5rem">🚚</span>
                            <div>
                                <strong class="block">Cash on Delivery</strong>
                                <small class="text-gray-400">Pay when you receive</small>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button class="btn btn-outline flex-1" onclick="showSection('Shipping')">Back</button>
                        <button class="btn btn-primary btn-lg flex-2" onclick="processOrder()">Complete Order</button>
                    </div>
                </div>
            </div>

            <aside class="checkout-sidebar">
                <div class="checkout-card">
                    <h3 class="mb-6">Order Summary</h3>
                    <div id="checkoutSummary">
                        <!-- Loaded from JS -->
                    </div>
                    <div class="mt-6 pt-6 border-t border-gray-100 flex items-center justify-center gap-4 text-xs text-gray-400">
                        <span>🛡️ Secure Gateway</span>
                        <span>✅ Buyer Protection</span>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
>
